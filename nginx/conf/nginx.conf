worker_processes auto;
events {
    worker_connections 2048;
}

http {
    # Initialize the monitoring zone for VTS
    vhost_traffic_status_zone;

    upstream gpu_cluster {
        least_conn; 
        server 10.2.213.176:8000 max_fails=3 fail_timeout=60s;
        server 10.2.213.81:8000 max_fails=3 fail_timeout=60s; 
        server 10.2.213.91:8000 max_fails=3 fail_timeout=60s; 
        server 10.2.213.8:8000 max_fails=3 fail_timeout=60s; 
        server 10.2.213.82:8000 max_fails=3 fail_timeout=60s;
        keepalive 256; 
    }

    server {
        # Listening on 8085 avoids the Port 80 conflict!
        listen 8085;

        location /process {
            proxy_pass http://gpu_cluster/process;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s; 

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 75s;
            add_header X-Node-Addr $upstream_addr always; # Exposes the specific worker IP
        }

        # Expose the VTS Dashboard
        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format html;
        }
    }
}